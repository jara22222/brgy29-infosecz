services:
    - type: web
      name: laravel-react-app
      env: docker
      plan: free
      envVars:
          - key: APP_ENV
            value: production
          - key: APP_DEBUG
            value: 'false'
          - key: APP_KEY
            generateValue: true
          - key: APP_URL
            sync: true
          - key: VITE_APP_URL
            sync: true
          - key: DB_CONNECTION
            value: sqlite
          - key: CACHE_DRIVER
            value: file
          - key: SESSION_DRIVER
            value: file
          - key: SESSION_LIFETIME
            value: '120'
          - key: QUEUE_CONNECTION
            value: sync
          - key: NODE_ENV
            value: production
# Uncomment and configure if you need a database
# databases:
#   - name: laravel-db
#     databaseName: laravel
#     user: laravel
#     plan: free
